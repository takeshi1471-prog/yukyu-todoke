<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="有給届書">
<title>有給休暇届書</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f4f4f4;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;padding:1rem}
.app{max-width:540px;margin:0 auto}
.card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.ttl{font-size:20px;font-weight:500;color:#1a1a1a;letter-spacing:0.08em;text-align:center;margin-bottom:4px}
.date-disp{text-align:center;font-size:12px;color:#666;margin-bottom:1.25rem}
.divider{height:0.5px;background:#e8e8e8;margin:1rem 0}
.sec-lbl{font-size:12px;color:#666;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sec-lbl::before{content:'';width:3px;height:13px;background:#378ADD;border-radius:2px;display:inline-block}
.name-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px}
.nchip{padding:10px 6px;border:0.5px solid #ccc;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;color:#1a1a1a;text-align:center;transition:all 0.12s;user-select:none;line-height:1.4;-webkit-tap-highlight-color:transparent}
.nchip:hover{border-color:#378ADD;color:#185FA5}
.nchip.sel{background:#E6F1FB;border-color:#378ADD;color:#0C447C;font-weight:500}
.chip-group{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:8px 14px;border:0.5px solid #ccc;border-radius:99px;font-size:13px;cursor:pointer;background:#fff;color:#1a1a1a;transition:all 0.12s;user-select:none;-webkit-tap-highlight-color:transparent}
.chip:hover{border-color:#378ADD;color:#185FA5}
.chip.sel{background:#E6F1FB;border-color:#378ADD;color:#0C447C;font-weight:500}
.cal-wrap{background:#f8f8f8;border:0.5px solid #e0e0e0;border-radius:8px;padding:12px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nav button{background:none;border:0.5px solid #ccc;color:#666;padding:4px 10px;border-radius:8px;cursor:pointer;font-size:13px}
.cal-nav button:hover{border-color:#378ADD;color:#378ADD}
.cal-month{font-size:14px;font-weight:500;color:#1a1a1a}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:10px;color:#999;padding:4px 0;font-weight:500}
.cal-dow.sun{color:#A32D2D}.cal-dow.sat{color:#185FA5}
.cal-day{text-align:center;font-size:13px;padding:7px 2px;border-radius:8px;cursor:pointer;color:#1a1a1a;border:0.5px solid transparent;transition:all 0.1s;line-height:1;-webkit-tap-highlight-color:transparent}
.cal-day:hover{border-color:#378ADD;color:#378ADD}
.cal-day.sel{background:#378ADD;color:#fff;font-weight:500;border-color:#378ADD}
.cal-day.today{border-color:#ccc}
.cal-day.empty{cursor:default;pointer-events:none}
.cal-day.sun{color:#A32D2D}.cal-day.sat{color:#185FA5}
.cal-day.sel{color:#fff}
.time-section{margin-top:10px}
.time-lbl{font-size:11px;color:#666;margin-bottom:6px}
.allday-btn{padding:8px 18px;border:0.5px solid #ccc;border-radius:99px;font-size:13px;cursor:pointer;background:#fff;color:#1a1a1a;transition:all 0.12s;user-select:none;margin-bottom:8px;-webkit-tap-highlight-color:transparent}
.allday-btn.sel{background:#E6F1FB;border-color:#378ADD;color:#0C447C;font-weight:500}
.time-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tsel{padding:7px 10px;border:0.5px solid #ccc;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a;min-width:62px}
.tsel:disabled{opacity:0.35;cursor:not-allowed}
.tsep{font-size:13px;color:#666}
.preview{background:#f8f8f8;border-radius:8px;padding:1rem;font-size:13px;line-height:2.2}
.prow{display:flex;gap:8px;align-items:baseline}
.plbl{color:#888;min-width:55px;font-size:11px;flex-shrink:0}
.pval{color:#1a1a1a}
.pval.empty{color:#bbb}
.sbtn{width:100%;padding:13px;border-radius:8px;border:none;background:#378ADD;color:#fff;font-size:15px;font-weight:500;cursor:pointer;letter-spacing:0.05em;transition:background 0.1s}
.sbtn:hover{background:#185FA5}
.sbtn:disabled{opacity:0.4;cursor:default}
.mail-btn{display:block;width:100%;padding:13px;border-radius:8px;border:2px solid #378ADD;background:#fff;color:#378ADD;font-size:15px;font-weight:500;cursor:pointer;letter-spacing:0.05em;text-align:center;text-decoration:none;margin-top:8px;transition:all 0.1s}
.mail-btn:hover{background:#E6F1FB}
.to-info{font-size:11px;color:#aaa;text-align:center;margin-top:6px}
.ok{background:#EAF3DE;border:0.5px solid #639922;border-radius:8px;padding:12px 16px;text-align:center;color:#3B6D11;font-size:13px;font-weight:500;margin-top:8px;display:none}
input[type=text]{outline:none}
input[type=text]:focus{border-color:#378ADD}
</style>
</head>
<body>
<div class="app">
<div class="card">
  <div class="ttl">有給休暇届書</div>
  <div class="date-disp" id="today-disp"></div>

  <div class="sec-lbl">氏名</div>
  <div class="name-grid" id="name-grid"></div>

  <div class="divider"></div>

  <div class="sec-lbl">区別</div>
  <div class="chip-group" id="kubetsu-grp">
    <div class="chip" data-v="1：有給休暇">1：有給休暇</div>
    <div class="chip" data-v="2：半日有給休暇">2：半日有給休暇</div>
    <div class="chip" data-v="3：遅刻">3：遅刻</div>
    <div class="chip" data-v="4：早退">4：早退</div>
    <div class="chip" data-v="5：欠勤">5：欠勤</div>
  </div>

  <div class="divider"></div>

  <div class="sec-lbl">日付・時刻</div>
  <div class="cal-wrap">
    <div class="cal-nav">
      <button id="prev-m">&#9664;</button>
      <span class="cal-month" id="cal-month"></span>
      <button id="next-m">&#9654;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div class="time-section">
    <div class="time-lbl">時刻</div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div class="allday-btn sel" id="allday-btn">終日</div>
      <span style="font-size:12px;color:#aaa">または時刻を指定</span>
    </div>
    <div class="time-row" id="time-row" style="margin-top:8px;opacity:0.35;pointer-events:none">
      <select class="tsel" id="sh" disabled></select>
      <span class="tsep">時</span>
      <select class="tsel" id="sm" disabled></select>
      <span class="tsep">分　〜　</span>
      <select class="tsel" id="eh" disabled></select>
      <span class="tsep">時</span>
      <select class="tsel" id="em" disabled></select>
      <span class="tsep">分</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="sec-lbl">事由</div>
  <div class="chip-group" id="jiyu-grp">
    <div class="chip" data-v="病院のため">病院のため</div>
    <div class="chip" data-v="体調不良のため">体調不良のため</div>
    <div class="chip" data-v="私用のため">私用のため</div>
    <div class="chip" data-v="家族の体調不良のため">家族の体調不良のため</div>
    <div class="chip" data-v="__other__">その他</div>
  </div>
  <div id="other-wrap" style="display:none;margin-top:8px">
    <input type="text" id="other-inp" placeholder="事由を入力" style="width:100%;padding:8px 12px;border:0.5px solid #ccc;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a">
  </div>

  <div class="divider"></div>

  <div class="sec-lbl">確認</div>
  <div class="preview">
    <div class="prow"><span class="plbl">氏名</span><span id="p-name" class="pval empty">未選択</span></div>
    <div class="prow"><span class="plbl">区別</span><span id="p-kubetsu" class="pval empty">未選択</span></div>
    <div class="prow"><span class="plbl">日時</span><span id="p-date" class="pval empty">未選択</span></div>
    <div class="prow"><span class="plbl">事由</span><span id="p-jiyu" class="pval empty">未選択</span></div>
  </div>

  <div style="margin-top:1.25rem">
    <button class="sbtn" id="sbtn">内容を確定してメールを作成する ▶</button>
    <a class="mail-btn" id="mail-link" style="display:none">メールアプリで送信する ✉</a>
    <div class="to-info" id="to-info" style="display:none">送信先：kanri-sumi@au.wakwak.com　keirisumi@bg.wakwak.com</div>
    <div class="ok" id="ok-msg"></div>
  </div>
</div>
</div>

<script>
(function(){
var TO='kanri-sumi@au.wakwak.com,keirisumi@bg.wakwak.com';
var S={name:null,kubetsu:null,date:null,jiyu:null,allday:true};
var WD=['日','月','火','水','木','金','土'];
var calY,calM;

function reiwa(d){
  var y=d.getFullYear()-2018;
  var m=d.getMonth()+1;
  var day=d.getDate();
  var w=WD[d.getDay()];
  return '令和'+y+'年'+m+'月'+day+'日（'+w+'曜日）';
}

var today=new Date();
calY=today.getFullYear();calM=today.getMonth();
document.getElementById('today-disp').textContent='記入日：'+reiwa(today);

var names=['古賀敏郎','志田秀幸','中村俊昭','花田浩一郎','加椎誠','濱口友香','村山剛','アディ','ノウヴァル','立石裕美'];
var ng=document.getElementById('name-grid');
names.forEach(function(n){
  var el=document.createElement('div');
  el.className='nchip';el.textContent=n;
  el.addEventListener('click',function(){
    document.querySelectorAll('.nchip').forEach(function(x){x.classList.remove('sel');});
    el.classList.add('sel');S.name=n;upd();
  });
  ng.appendChild(el);
});

function buildCal(){
  var grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  var rY=calY-2018;
  document.getElementById('cal-month').textContent=(rY>0?'令和'+rY+'年':calY+'年')+' '+(calM+1)+'月';
  ['日','月','火','水','木','金','土'].forEach(function(d,i){
    var el=document.createElement('div');
    el.className='cal-dow'+(i===0?' sun':i===6?' sat':'');
    el.textContent=d;grid.appendChild(el);
  });
  var first=new Date(calY,calM,1).getDay();
  for(var i=0;i<first;i++){var el=document.createElement('div');el.className='cal-day empty';grid.appendChild(el);}
  var dim=new Date(calY,calM+1,0).getDate();
  for(var d2=1;d2<=dim;d2++){
    (function(day){
      var dt=new Date(calY,calM,day);
      var dow=dt.getDay();
      var cls='cal-day'+(dow===0?' sun':dow===6?' sat':'');
      if(dt.toDateString()===today.toDateString())cls+=' today';
      var ds=reiwa(dt);
      if(S.date===ds)cls+=' sel';
      var el=document.createElement('div');
      el.className=cls;el.textContent=day;
      el.addEventListener('click',function(){S.date=ds;buildCal();upd();});
      grid.appendChild(el);
    })(d2);
  }
}
buildCal();

document.getElementById('prev-m').addEventListener('click',function(){calM--;if(calM<0){calM=11;calY--;}buildCal();});
document.getElementById('next-m').addEventListener('click',function(){calM++;if(calM>11){calM=0;calY++;}buildCal();});

var sh=document.getElementById('sh'),sm=document.getElementById('sm'),eh=document.getElementById('eh'),em=document.getElementById('em');
function addOpt(s,v,l){var o=document.createElement('option');o.value=v;o.textContent=l;s.appendChild(o);}
addOpt(sh,'','--');addOpt(eh,'','--');
for(var h=6;h<=21;h++){addOpt(sh,h,h+'');addOpt(eh,h,h+'');}
addOpt(sm,'','--');addOpt(em,'','--');
[0,15,30,45].forEach(function(v){addOpt(sm,v,('0'+v).slice(-2));addOpt(em,v,('0'+v).slice(-2));});
[sh,sm,eh,em].forEach(function(s){s.addEventListener('change',upd);});

var alldayBtn=document.getElementById('allday-btn');
var timeRow=document.getElementById('time-row');
alldayBtn.addEventListener('click',function(){
  S.allday=!S.allday;
  if(S.allday){
    alldayBtn.classList.add('sel');
    timeRow.style.opacity='0.35';timeRow.style.pointerEvents='none';
    [sh,sm,eh,em].forEach(function(s){s.disabled=true;s.value='';});
  } else {
    alldayBtn.classList.remove('sel');
    timeRow.style.opacity='1';timeRow.style.pointerEvents='auto';
    [sh,sm,eh,em].forEach(function(s){s.disabled=false;});
  }
  upd();
});

document.querySelectorAll('#kubetsu-grp .chip').forEach(function(c){
  c.addEventListener('click',function(){
    document.querySelectorAll('#kubetsu-grp .chip').forEach(function(x){x.classList.remove('sel');});
    c.classList.add('sel');S.kubetsu=c.dataset.v;upd();
  });
});

document.querySelectorAll('#jiyu-grp .chip').forEach(function(c){
  c.addEventListener('click',function(){
    document.querySelectorAll('#jiyu-grp .chip').forEach(function(x){x.classList.remove('sel');});
    c.classList.add('sel');
    var isOther=c.dataset.v==='__other__';
    document.getElementById('other-wrap').style.display=isOther?'block':'none';
    S.jiyu=isOther?(document.getElementById('other-inp').value||null):c.dataset.v;
    upd();
  });
});
document.getElementById('other-inp').addEventListener('input',function(){S.jiyu=this.value||null;upd();});

function setP(id,val){
  var el=document.getElementById(id);
  if(val){el.textContent=val;el.className='pval';}
  else{el.textContent='未選択';el.className='pval empty';}
}

function getTimeTxt(){
  if(S.allday)return '終日';
  if(sh.value&&sm.value&&eh.value&&em.value)
    return sh.value+'時'+('0'+sm.value).slice(-2)+'分 〜 '+eh.value+'時'+('0'+em.value).slice(-2)+'分';
  return '終日';
}

function upd(){
  setP('p-name',S.name);
  setP('p-kubetsu',S.kubetsu);
  setP('p-date',S.date?(S.date+' '+getTimeTxt()):null);
  setP('p-jiyu',S.jiyu);
  document.getElementById('mail-link').style.display='none';
  document.getElementById('to-info').style.display='none';
  document.getElementById('sbtn').style.display='block';
  document.getElementById('ok-msg').style.display='none';
  document.getElementById('sbtn').disabled=false;
}

document.getElementById('sbtn').addEventListener('click',function(){
  if(!S.name||!S.kubetsu||!S.date||!S.jiyu){
    alert('氏名・区別・日付・事由はすべて必須です。');return;
  }
  var dtxt=S.date+' '+getTimeTxt();
  var subject=encodeURIComponent('有給休暇届書：'+S.name);
  var body=encodeURIComponent(
    '有給休暇届書\n\n'+
    '記入日：'+reiwa(today)+'\n'+
    '氏　名：'+S.name+'\n'+
    '区　別：'+S.kubetsu+'\n'+
    '日　時：'+dtxt+'\n'+
    '事　由：'+S.jiyu+'\n\n'+
    '以上、よろしくお願いいたします。'
  );
  var link=document.getElementById('mail-link');
  link.href='mailto:'+TO+'?subject='+subject+'&body='+body;
  link.style.display='block';
  document.getElementById('to-info').style.display='block';
  document.getElementById('sbtn').style.display='none';
  var ok=document.getElementById('ok-msg');
  ok.style.display='block';
  ok.textContent='✔ 内容を確定しました。下のボタンからメールアプリで送信してください。';
});

upd();
})();
</script>
</body>
</html>
